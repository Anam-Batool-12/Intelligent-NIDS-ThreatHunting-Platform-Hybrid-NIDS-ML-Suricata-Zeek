input {
  # Suricata alerts + event log (JSON lines)
  file {
    path => "/var/log/suricata/eve.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    tags => ["suricata"]
  }

  # Zeek connection log (tab-separated)
  file {
    path => "/var/log/zeek/conn.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["zeek", "conn"]
  }
}

filter {
  if "suricata" in [tags] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
    mutate {
      add_field => { "source_type" => "suricata" }
    }
  }

  if "zeek" in [tags] {
    csv {
      separator => "	"
      columns => ["ts","uid","id.orig_h","id.orig_p","id.resp_h","id.resp_p",
                  "proto","service","duration","orig_bytes","resp_bytes",
                  "conn_state","local_orig","local_resp","missed_bytes",
                  "history","orig_pkts","orig_ip_bytes","resp_pkts","resp_ip_bytes"]
    }
    date {
      match => ["ts", "UNIX"]
      target => "@timestamp"
    }
    mutate {
      add_field => { "source_type" => "zeek_conn" }
    }
  }
}

output {
  if "suricata" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "nids-alerts-%{+YYYY.MM.dd}"
    }
  }

  if "zeek" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "nids-conn-%{+YYYY.MM.dd}"
    }
  }

  # Uncomment for debugging
  # stdout { codec => rubydebug }
}
